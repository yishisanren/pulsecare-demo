<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseCare Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: #f0f0f0; display: flex; height: 100vh; overflow: hidden; }

.sidebar { width: 280px; background: #fff; border-right: 1px solid #e5e5e5; display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; }
.sidebar-header { padding: 20px; border-bottom: 1px solid #e5e5e5; }
.sidebar-header h2 { font-size: 15px; font-weight: 700; color: #1a1a1a; }
.sidebar-header p { font-size: 12px; color: #999; margin-top: 4px; }
.sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
.sidebar-group { margin-bottom: 12px; }
.sidebar-group-title { font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px 4px; }
.sidebar-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #333; transition: all 0.15s; display: flex; align-items: center; gap: 8px; }
.sidebar-item:hover { background: #f5f5f5; }
.sidebar-item.active { background: #fce4ec; color: #c62828; font-weight: 500; }
.sidebar-item .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sidebar-item .dot.green { background: #4caf50; }
.sidebar-item .dot.orange { background: #ff9800; }
.sidebar-item .dot.red { background: #f44336; }
.sidebar-item .dot.blue { background: #2196f3; }
.sidebar-item .dot.gray { background: #9e9e9e; }

.phone-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
.phone-frame { width: 375px; height: 812px; background: #fff; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.05); position: relative; display: flex; flex-direction: column; }

.status-bar { height: 54px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 28px 8px; flex-shrink: 0; }
.status-time { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.status-icons { display: flex; align-items: center; gap: 5px; }

.nav-bar { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; flex-shrink: 0; }
.nav-bar .back-btn, .nav-bar .settings-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
.nav-bar .title { font-size: 17px; font-weight: 600; color: #1a1a1a; }

.page-content { flex: 1; overflow-y: auto; padding-bottom: 34px; }
.page-content::-webkit-scrollbar { display: none; }

.device-section { padding: 20px 20px 8px; display: flex; flex-direction: column; align-items: center; }
.device-img-wrap { width: 200px; height: 130px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; }
.device-placeholder { width: 180px; height: 105px; background: linear-gradient(145deg, #d5d5d5 0%, #a8a8a8 100%); border-radius: 55px 55px 18px 18px; position: relative; overflow: hidden; }
.device-placeholder::before { content: ''; position: absolute; inset: 12px 25px 20px; background: linear-gradient(145deg, #c0c0c0 0%, #909090 100%); border-radius: 40px 40px 10px 10px; }
.device-placeholder::after { content: ''; position: absolute; top: 22px; left: 35px; right: 35px; bottom: 30px; background: repeating-linear-gradient(0deg, transparent, transparent 7px, rgba(255,255,255,0.2) 7px, rgba(255,255,255,0.2) 9px); border-radius: 30px 30px 8px 8px; }
.device-placeholder .cam { position: absolute; bottom: 10px; left: 16px; width: 14px; height: 14px; background: #333; border-radius: 50%; border: 2px solid #555; }
.device-status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; color: #999; font-size: 13px; }
.device-ready-text { font-size: 14px; color: #999; }

.connect-cta { display: inline-flex; align-items: center; gap: 6px; padding: 8px 20px; background: #c4787a; color: #fff; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; margin-top: 6px; }

.draft-banner { margin: 8px 16px; padding: 14px 16px; background: linear-gradient(135deg, #fff3e0, #ffe0b2); border-radius: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
.draft-banner .icon-wrap { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.draft-banner .text { flex: 1; }
.draft-banner .label { font-size: 13px; font-weight: 600; }
.draft-banner .desc { font-size: 11px; margin-top: 2px; }

.card { margin: 8px 16px; background: #f8f8f8; border-radius: 16px; padding: 18px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.card-link { font-size: 13px; color: #d4a0a0; font-weight: 500; cursor: pointer; }

.schedule-item { display: flex; align-items: center; padding: 12px; background: #fff; border-radius: 12px; margin-bottom: 8px; cursor: pointer; }
.schedule-item:last-child { margin-bottom: 0; }
.schedule-num { width: 36px; height: 36px; border-radius: 50%; background: #fce4ec; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #c4787a; margin-right: 12px; flex-shrink: 0; }
.schedule-info { flex: 1; }
.schedule-name { font-size: 14px; font-weight: 500; color: #1a1a1a; }
.schedule-meta { font-size: 12px; color: #999; margin-top: 2px; }

.customize-card { margin: 8px 16px; background: #f8f8f8; border-radius: 16px; padding: 18px; cursor: pointer; }
.customize-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.customize-label { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.customize-desc { font-size: 12px; color: #999; }
.customize-mode { display: flex; align-items: center; padding: 12px; background: #fff; border-radius: 12px; }
.customize-mode .cm-num { width: 36px; height: 36px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #999; margin-right: 12px; flex-shrink: 0; }
.customize-mode .cm-info { flex: 1; }
.customize-mode .cm-name { font-size: 14px; font-weight: 500; color: #1a1a1a; }
.customize-mode .cm-meta { font-size: 12px; color: #999; margin-top: 2px; }
.customize-link { font-size: 13px; color: #d4a0a0; font-weight: 500; cursor: pointer; }

.record-card { margin: 8px 16px; background: #f8f8f8; border-radius: 16px; padding: 18px; cursor: pointer; }
.record-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.record-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.record-body { display: flex; align-items: flex-end; justify-content: space-between; }
.stat-label { font-size: 12px; color: #999; }
.stat-value { font-size: 32px; font-weight: 700; color: #1a1a1a; margin-top: 2px; }
.mini-bars { display: flex; align-items: flex-end; gap: 3px; height: 40px; }
.mini-bar { width: 8px; border-radius: 4px; }

.assessment-cta { margin: 8px 16px 20px; background: #f8f8f8; border-radius: 16px; padding: 18px; cursor: pointer; display: flex; align-items: center; gap: 14px; }
.cta-text { flex: 1; }
.cta-title { font-size: 14px; font-weight: 600; color: #1a1a1a; }
.cta-desc { font-size: 12px; color: #999; margin-top: 4px; }
.cta-link { font-size: 13px; color: #c4787a; font-weight: 500; margin-top: 8px; display: flex; align-items: center; gap: 4px; }
.cta-illust { width: 80px; height: 80px; background: linear-gradient(135deg, #fce4ec, #f8bbd0); border-radius: 50%; display: flex; align-items: center; justify-content: center; }

.empty-box { padding: 36px 20px; text-align: center; }
.empty-icon { width: 72px; height: 72px; background: #f0f0f0; border-radius: 50%; margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; }
.empty-text { font-size: 13px; color: #999; line-height: 1.5; margin-bottom: 16px; }
.empty-btn { display: inline-block; padding: 10px 24px; background: #c4787a; color: #fff; border-radius: 24px; font-size: 14px; font-weight: 500; cursor: pointer; }

.rest-box { padding: 28px 20px; text-align: center; }
.rest-emoji { font-size: 40px; margin-bottom: 10px; }
.rest-text { font-size: 14px; color: #999; line-height: 1.5; }

.done-box { padding: 24px 20px; text-align: center; }
.done-check { width: 48px; height: 48px; background: #e8f5e9; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; }
.done-text { font-size: 14px; color: #999; }

.mode-panel { position: absolute; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 24px 24px 0 0; z-index: 10; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); max-height: 80%; overflow-y: auto; }
.mode-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 12px auto; }
.mode-panel-title { font-size: 16px; font-weight: 600; padding: 0 20px 14px; color: #1a1a1a; }
.mode-list { padding: 0 16px 34px; display: flex; flex-direction: column; gap: 8px; }
.mode-item { display: flex; align-items: center; padding: 14px; background: #f8f8f8; border-radius: 14px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
.mode-item:hover { border-color: #e0e0e0; }
.mode-item.sel { border-color: #c4787a; background: #fdf0f0; }
.mode-item .mi-num { width: 36px; height: 36px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #999; margin-right: 12px; flex-shrink: 0; }
.mode-item.sel .mi-num { background: #fce4ec; color: #c4787a; }
.mode-item .mi-info { flex: 1; min-width: 0; }
.mode-item .mi-name { font-size: 14px; font-weight: 600; color: #1a1a1a; }
.mode-item .mi-desc { font-size: 11px; color: #999; margin-top: 2px; }
.mode-item .mi-tags { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.mode-item .mi-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: #f0f0f0; color: #777; }
.mode-item.sel .mi-tag { background: #fce4ec; color: #c4787a; }
.mode-item .mi-arrow { color: #ccc; flex-shrink: 0; margin-left: 8px; }

.overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 20; display: flex; align-items: center; justify-content: center; }
.dialog { background: #fff; border-radius: 20px; padding: 28px 24px; width: 300px; text-align: center; }
.dialog-icon { width: 56px; height: 56px; background: #e3f2fd; border-radius: 50%; margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; }
.dialog-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: #1a1a1a; }
.dialog-desc { font-size: 13px; color: #999; margin-bottom: 20px; line-height: 1.5; }
.btn-primary { width: 100%; padding: 12px; background: #c4787a; color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 8px; }
.btn-ghost { width: 100%; padding: 12px; background: transparent; color: #999; border: none; font-size: 14px; cursor: pointer; }

.badge-dot { width: 8px; height: 8px; background: #f44336; border-radius: 50%; position: absolute; top: 2px; right: 2px; }

.no-data-text { padding: 20px 0; text-align: center; font-size: 12px; color: #ccc; }

.guide-page { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 0; }
.guide-device-area { width: 100%; background: #f2f2f2; display: flex; align-items: center; justify-content: center; padding: 32px 0 28px; position: relative; }
.guide-device-img { width: 180px; height: 120px; background: linear-gradient(135deg, #e8ddd5, #d4c8be); border-radius: 60px 60px 20px 20px; position: relative; display: flex; align-items: center; justify-content: center; }
.guide-device-img::after { content: ''; position: absolute; bottom: 16px; right: 28px; width: 12px; height: 12px; border-radius: 50%; background: #4caf50; box-shadow: 0 0 6px rgba(76,175,80,0.5); }
.guide-device-label { position: absolute; bottom: 8px; font-size: 10px; color: #999; letter-spacing: 2px; }
.guide-steps-area { width: 100%; padding: 20px 16px; }
.guide-steps-title { font-size: 13px; color: #999; margin-bottom: 12px; }
.guide-step-card { background: #fff; border: 1px solid #f0f0f0; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 12px; }
.guide-step-num { width: 24px; height: 24px; border-radius: 50%; background: #fef0f0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #c4787a; flex-shrink: 0; }
.guide-step-text { font-size: 13px; color: #333; line-height: 1.5; }
.guide-scan-area { margin-top: auto; padding: 24px 0 32px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
.guide-scan-icon { width: 44px; height: 44px; border-radius: 50%; background: rgba(196,120,122,0.1); display: flex; align-items: center; justify-content: center; animation: scanPulse 2s infinite; }
.guide-scan-text { font-size: 13px; color: #c4787a; font-weight: 500; }
@keyframes scanPulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.15); opacity: 0.7; } }
@keyframes pulse { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }

/* Assessment module selection */
.assess-page { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
.assess-page::-webkit-scrollbar { display: none; }
.assess-body { flex: 1; padding: 20px 16px; }
.assess-subtitle { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
.assess-desc { font-size: 13px; color: #999; margin-bottom: 20px; line-height: 1.5; }
.module-option { display: flex; align-items: center; gap: 14px; padding: 16px; background: #f8f8f8; border-radius: 14px; margin-bottom: 10px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
.module-option.sel { border-color: #c4787a; background: #fdf0f0; }
.module-option .mo-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.module-option .mo-info { flex: 1; }
.module-option .mo-name { font-size: 14px; font-weight: 600; color: #1a1a1a; }
.module-option .mo-desc { font-size: 12px; color: #999; margin-top: 2px; }
.module-option .mo-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.module-option.sel .mo-check { border-color: #c4787a; background: #c4787a; }
.module-none { padding: 14px 0; text-align: center; font-size: 13px; color: #999; cursor: pointer; }
.module-none:hover { color: #c4787a; }
.assess-footer { padding: 12px 16px 34px; }
.assess-footer .btn-primary { border-radius: 24px; }
.assess-footer .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

/* Questionnaire */
.q-nav { display: flex; align-items: center; justify-content: space-between; height: 44px; padding: 0 16px; flex-shrink: 0; }
.q-cancel { font-size: 15px; color: #c4787a; font-weight: 500; cursor: pointer; }
.q-step-label { font-size: 13px; color: #999; }
.q-progress-bar { height: 3px; background: #f0f0f0; margin: 0 16px; flex-shrink: 0; border-radius: 2px; }
.q-progress-fill { height: 100%; background: #c4787a; border-radius: 2px; transition: width 0.3s; }
.q-module-tag { margin: 16px 16px 0; display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.q-module-tag.incont { background: #fce4ec; color: #c4787a; }
.q-module-tag.pain { background: #fff3e0; color: #e65100; }
.q-module-tag.hip { background: #e8f5e9; color: #2e7d32; }
.q-body { flex: 1; padding: 20px 16px; }
.q-title { font-size: 18px; font-weight: 700; color: #1a1a1a; line-height: 1.4; margin-bottom: 20px; }
.q-option { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: #f8f8f8; border-radius: 12px; margin-bottom: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
.q-option.sel { border-color: #c4787a; background: #fdf0f0; }
.q-option .qo-radio { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #ddd; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.q-option.sel .qo-radio { border-color: #c4787a; }
.q-option.sel .qo-radio::after { content: ''; width: 10px; height: 10px; border-radius: 50%; background: #c4787a; }
.q-option .qo-text { font-size: 14px; color: #333; }
.q-option.sel .qo-text { color: #1a1a1a; font-weight: 500; }
.q-btns { display: flex; gap: 10px; padding: 12px 16px 34px; flex-shrink: 0; }
.q-btns .btn-prev { flex: 1; padding: 12px; background: #f0f0f0; color: #555; border: none; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; }
.q-btns .btn-next { flex: 2; padding: 12px; background: #c4787a; color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; }
.q-btns .btn-next.submit { background: #c4787a; }

/* Exit dialog */
.exit-dialog { background: #fff; border-radius: 20px; padding: 28px 24px; width: 300px; text-align: center; }
.exit-dialog .ed-title { font-size: 17px; font-weight: 700; color: #1a1a1a; margin-bottom: 10px; }
.exit-dialog .ed-desc { font-size: 13px; color: #999; line-height: 1.6; margin-bottom: 20px; }
.exit-dialog .btn-save { width: 100%; padding: 12px; background: #c4787a; color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 8px; }
.exit-dialog .btn-discard { width: 100%; padding: 12px; background: #f8f8f8; color: #e53935; border: none; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 8px; }
.exit-dialog .btn-stay { width: 100%; padding: 10px; background: transparent; color: #999; border: none; font-size: 13px; cursor: pointer; }

/* Loading / generating */
.loading-page { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
.loading-spinner { width: 56px; height: 56px; border: 3px solid #f0f0f0; border-top-color: #c4787a; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 24px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 15px; color: #999; text-align: center; line-height: 1.6; }

/* Assessment result */
.result-page { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
.result-page::-webkit-scrollbar { display: none; }
.result-tabs { display: flex; gap: 0; padding: 0 16px; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; }
.result-tab { flex: 1; text-align: center; padding: 10px 0; font-size: 13px; font-weight: 500; color: #999; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.result-tab.active { color: #c4787a; border-bottom-color: #c4787a; }
.result-body { flex: 1; padding: 20px 16px; }
.result-severity { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.severity-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.severity-badge.moderate { background: #fff3e0; color: #e65100; }
.severity-badge.mild { background: #e8f5e9; color: #2e7d32; }
.severity-badge.severe { background: #fce4ec; color: #c62828; }
.severity-badge.improved { background: #e8f5e9; color: #2e7d32; }
.result-score { font-size: 13px; color: #999; }
.result-section { margin-bottom: 20px; }
.result-section-title { font-size: 13px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.result-card { background: #f8f8f8; border-radius: 14px; padding: 16px; }
.result-card .rc-label { font-size: 12px; color: #999; margin-bottom: 4px; }
.result-card .rc-value { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.result-card .rc-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
.result-card .rc-row + .rc-row { border-top: 1px solid #f0f0f0; }
.result-disclaimer { font-size: 11px; color: #bbb; text-align: center; line-height: 1.5; padding: 12px 0; }
.result-footer { padding: 12px 16px 34px; flex-shrink: 0; }

/* Trend chart area */
.trend-area { background: #f8f8f8; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
.trend-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.trend-title { font-size: 13px; font-weight: 600; color: #1a1a1a; }
.trend-change { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
.trend-change.improved { background: #e8f5e9; color: #2e7d32; }
.trend-change.worsened { background: #fce4ec; color: #c62828; }
.trend-legend { display: flex; gap: 14px; margin-top: 10px; }
.trend-legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #999; }
.trend-legend-dot { width: 8px; height: 8px; border-radius: 50%; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h2>PulseCare 原型演示</h2>
    <p>设备主页 · 问卷评估</p>
  </div>
  <div class="sidebar-list">
    <div class="sidebar-group">
      <div class="sidebar-group-title">设备主页</div>

<script>
const MODES = [
  { name: 'Activation', cat: 'Basic', desc: 'Awaken pelvic floor and hip-leg muscles', time: '24 mins', icon: 'zap' },
  { name: 'Strength', cat: 'Advanced', desc: 'Enhance muscle strength', time: '24 mins', icon: 'dumbbell' },
  { name: 'Endurance', cat: 'Advanced', desc: 'Improve muscle endurance', time: '30 mins', icon: 'timer' },
  { name: 'Functional', cat: 'Advanced', desc: 'Improve functional performance', time: '24 mins', icon: 'target' },
  { name: 'Relaxation Cycle', cat: 'Recovery', desc: 'Relieve muscle fatigue', time: '20 mins', icon: 'cloud' },
  { name: 'Pain Soothe', cat: 'Pain', desc: 'Relieve chronic pain', time: '20 mins', icon: 'heart-pulse' },
  { name: 'Quick Relief', cat: 'Pain', desc: 'Rapid pain relief', time: '15 mins', icon: 'shield' },
  { name: 'Mid-Frequency', cat: 'Therapy', desc: 'Mid-frequency electrotherapy', time: '25 mins', icon: 'activity' },
  { name: 'Low-Frequency', cat: 'Therapy', desc: 'Low-frequency electrotherapy', time: '25 mins', icon: 'radio' },
];

const state = { selectedMode: 0, currentPage: 'home-connected' };

function openModePanel() {
  const phone = document.getElementById('phone');
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.style.background = 'transparent';
  overlay.onclick = (e) => { if (e.target === overlay) closeModePanel(); };
  const dim = phone.querySelector('.page-content');
  if (dim) dim.style.filter = 'brightness(0.6)';

  const items = MODES.map((m, i) => `<div class="mode-item${i===state.selectedMode?' sel':''}" onclick="selectMode(${i})">
    <div class="mi-num">0${i+1}</div>
    <div class="mi-info">
      <div class="mi-name">${m.name}</div>
      <div class="mi-desc">${m.desc}</div>
      <div class="mi-tags"><span class="mi-tag">${m.cat}</span><span class="mi-tag">${m.time}</span></div>
    </div>
    <i data-lucide="chevron-right" class="mi-arrow" style="width:16px;height:16px"></i>
  </div>`).join('');

  const panel = document.createElement('div');
  panel.className = 'mode-panel';
  panel.id = 'modePanel';
  panel.innerHTML = `<div class="mode-handle"></div><div class="mode-panel-title">Select Training Mode</div><div class="mode-list">${items}</div>`;
  phone.appendChild(overlay);
  phone.appendChild(panel);
  if (window.lucide) lucide.createIcons();
}

function closeModePanel() {
  const phone = document.getElementById('phone');
  const panel = phone.querySelector('#modePanel');
  const overlay = phone.querySelector('.overlay');
  if (panel) panel.remove();
  if (overlay) overlay.remove();
  const dim = phone.querySelector('.page-content');
  if (dim) dim.style.filter = '';
}

function selectMode(idx) {
  state.selectedMode = idx;
  closeModePanel();
  showPage(document.querySelector('.sidebar-item.active'));
}

function showConnectGuide() {
  const el = document.querySelector('[data-page="connect-guide"]');
  if (el) showPage(el);
}

function showPage(el) {
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));

  state.currentPage = el.dataset.page;
  document.getElementById('phone').innerHTML = pages[el.dataset.page]();
  if (window.lucide) lucide.createIcons();
}

});
