<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseCare Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: #f0f0f0; display: flex; height: 100vh; overflow: hidden; }

.sidebar { width: 280px; background: #fff; border-right: 1px solid #e5e5e5; display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; }
.sidebar-header { padding: 20px; border-bottom: 1px solid #e5e5e5; }
.sidebar-header h2 { font-size: 15px; font-weight: 700; color: #1a1a1a; }
.sidebar-header p { font-size: 12px; color: #999; margin-top: 4px; }
.sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
.sidebar-group { margin-bottom: 12px; }
.sidebar-group-title { font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px 4px; }
.sidebar-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #333; transition: all 0.15s; display: flex; align-items: center; gap: 8px; }
.sidebar-item:hover { background: #f5f5f5; }
.sidebar-item.active { background: #fce4ec; color: #c62828; font-weight: 500; }
.sidebar-item .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sidebar-item .dot.green { background: #4caf50; }
.sidebar-item .dot.orange { background: #ff9800; }
.sidebar-item .dot.red { background: #f44336; }
.sidebar-item .dot.blue { background: #2196f3; }
.sidebar-item .dot.gray { background: #9e9e9e; }

.phone-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
.phone-frame { width: 375px; height: 812px; background: #fff; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.05); position: relative; display: flex; flex-direction: column; }

.status-bar { height: 54px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 28px 8px; flex-shrink: 0; }
.status-time { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.status-icons { display: flex; align-items: center; gap: 5px; }

.nav-bar { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; flex-shrink: 0; }
.nav-bar .back-btn, .nav-bar .settings-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
.nav-bar .title { font-size: 17px; font-weight: 600; color: #1a1a1a; }

.page-content { flex: 1; overflow-y: auto; padding-bottom: 34px; }
.page-content::-webkit-scrollbar { display: none; }

.device-section { padding: 20px 20px 8px; display: flex; flex-direction: column; align-items: center; }
.device-img-wrap { width: 200px; height: 130px; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; }
.device-placeholder { width: 180px; height: 105px; background: linear-gradient(145deg, #d5d5d5 0%, #a8a8a8 100%); border-radius: 55px 55px 18px 18px; position: relative; overflow: hidden; }
.device-placeholder::before { content: ''; position: absolute; inset: 12px 25px 20px; background: linear-gradient(145deg, #c0c0c0 0%, #909090 100%); border-radius: 40px 40px 10px 10px; }
.device-placeholder::after { content: ''; position: absolute; top: 22px; left: 35px; right: 35px; bottom: 30px; background: repeating-linear-gradient(0deg, transparent, transparent 7px, rgba(255,255,255,0.2) 7px, rgba(255,255,255,0.2) 9px); border-radius: 30px 30px 8px 8px; }
.device-placeholder .cam { position: absolute; bottom: 10px; left: 16px; width: 14px; height: 14px; background: #333; border-radius: 50%; border: 2px solid #555; }
.device-status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; color: #999; font-size: 13px; }
.device-ready-text { font-size: 14px; color: #999; }

.connect-cta { display: inline-flex; align-items: center; gap: 6px; padding: 8px 20px; background: #c4787a; color: #fff; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; margin-top: 6px; }

.draft-banner { margin: 8px 16px; padding: 14px 16px; background: linear-gradient(135deg, #fff3e0, #ffe0b2); border-radius: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
.draft-banner .icon-wrap { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.draft-banner .text { flex: 1; }
.draft-banner .label { font-size: 13px; font-weight: 600; }
.draft-banner .desc { font-size: 11px; margin-top: 2px; }

.card { margin: 8px 16px; background: #f8f8f8; border-radius: 16px; padding: 18px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.card-link { font-size: 13px; color: #d4a0a0; font-weight: 500; cursor: pointer; }

.schedule-item { display: flex; align-items: center; padding: 12px; background: #fff; border-radius: 12px; margin-bottom: 8px; cursor: pointer; }
.schedule-item:last-child { margin-bottom: 0; }
.schedule-num { width: 36px; height: 36px; border-radius: 50%; background: #fce4ec; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #c4787a; margin-right: 12px; flex-shrink: 0; }
.schedule-info { flex: 1; }
.schedule-name { font-size: 14px; font-weight: 500; color: #1a1a1a; }
.schedule-meta { font-size: 12px; color: #999; margin-top: 2px; }

.customize-card { margin: 8px 16px; background: #f8f8f8; border-radius: 16px; padding: 18px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
.customize-label { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.customize-desc { font-size: 12px; color: #999; margin-top: 4px; }

.record-card { margin: 8px 16px; background: #f8f8f8; border-radius: 16px; padding: 18px; cursor: pointer; }
.record-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.record-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.record-body { display: flex; align-items: flex-end; justify-content: space-between; }
.stat-label { font-size: 12px; color: #999; }
.stat-value { font-size: 32px; font-weight: 700; color: #1a1a1a; margin-top: 2px; }
.mini-bars { display: flex; align-items: flex-end; gap: 3px; height: 40px; }
.mini-bar { width: 8px; border-radius: 4px; }

.assessment-cta { margin: 8px 16px 20px; background: #f8f8f8; border-radius: 16px; padding: 18px; cursor: pointer; display: flex; align-items: center; gap: 14px; }
.cta-text { flex: 1; }
.cta-title { font-size: 14px; font-weight: 600; color: #1a1a1a; }
.cta-desc { font-size: 12px; color: #999; margin-top: 4px; }
.cta-link { font-size: 13px; color: #c4787a; font-weight: 500; margin-top: 8px; display: flex; align-items: center; gap: 4px; }
.cta-illust { width: 80px; height: 80px; background: linear-gradient(135deg, #fce4ec, #f8bbd0); border-radius: 50%; display: flex; align-items: center; justify-content: center; }

.empty-box { padding: 36px 20px; text-align: center; }
.empty-icon { width: 72px; height: 72px; background: #f0f0f0; border-radius: 50%; margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; }
.empty-text { font-size: 13px; color: #999; line-height: 1.5; margin-bottom: 16px; }
.empty-btn { display: inline-block; padding: 10px 24px; background: #c4787a; color: #fff; border-radius: 24px; font-size: 14px; font-weight: 500; cursor: pointer; }

.rest-box { padding: 28px 20px; text-align: center; }
.rest-emoji { font-size: 40px; margin-bottom: 10px; }
.rest-text { font-size: 14px; color: #999; line-height: 1.5; }

.done-box { padding: 24px 20px; text-align: center; }
.done-check { width: 48px; height: 48px; background: #e8f5e9; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; }
.done-text { font-size: 14px; color: #999; }

.mode-panel { position: absolute; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 24px 24px 0 0; z-index: 10; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); max-height: 70%; overflow-y: auto; }
.mode-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 12px auto; }
.mode-panel-title { font-size: 16px; font-weight: 600; padding: 0 20px 14px; color: #1a1a1a; }
.mode-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 0 16px 34px; }
.mode-card { background: #f8f8f8; border-radius: 14px; padding: 14px 8px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
.mode-card:hover { border-color: #c4787a; }
.mode-card.sel { border-color: #c4787a; background: #fce4ec; }
.mode-icon-box { width: 38px; height: 38px; background: #fff; border-radius: 10px; margin: 0 auto 6px; display: flex; align-items: center; justify-content: center; }
.mode-name { font-size: 11px; font-weight: 600; color: #1a1a1a; line-height: 1.3; }
.mode-time { font-size: 10px; color: #999; margin-top: 2px; }

.overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 20; display: flex; align-items: center; justify-content: center; }
.dialog { background: #fff; border-radius: 20px; padding: 28px 24px; width: 300px; text-align: center; }
.dialog-icon { width: 56px; height: 56px; background: #e3f2fd; border-radius: 50%; margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; }
.dialog-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: #1a1a1a; }
.dialog-desc { font-size: 13px; color: #999; margin-bottom: 20px; line-height: 1.5; }
.btn-primary { width: 100%; padding: 12px; background: #c4787a; color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 8px; }
.btn-ghost { width: 100%; padding: 12px; background: transparent; color: #999; border: none; font-size: 14px; cursor: pointer; }

.badge-dot { width: 8px; height: 8px; background: #f44336; border-radius: 50%; position: absolute; top: 2px; right: 2px; }

.no-data-text { padding: 20px 0; text-align: center; font-size: 12px; color: #ccc; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h2>PulseCare 原型演示</h2>
    <p>设备主页 · 所有状态</p>
  </div>
  <div class="sidebar-list">
    <div class="sidebar-group">
      <div class="sidebar-group-title">设备主页</div>
      <div class="sidebar-item active" data-page="home-connected" onclick="showPage(this)">
        <span class="dot green"></span>已连接 · 有训练任务
      </div>
      <div class="sidebar-item" data-page="home-completed" onclick="showPage(this)">
        <span class="dot green"></span>已连接 · 今日已完成
      </div>
      <div class="sidebar-item" data-page="home-rest" onclick="showPage(this)">
        <span class="dot green"></span>已连接 · 今日休息日
      </div>
      <div class="sidebar-item" data-page="home-no-schedule" onclick="showPage(this)">
        <span class="dot orange"></span>已连接 · 无活跃日程
      </div>
      <div class="sidebar-item" data-page="home-disconnected" onclick="showPage(this)">
        <span class="dot gray"></span>设备未连接
      </div>
      <div class="sidebar-item" data-page="home-draft" onclick="showPage(this)">
        <span class="dot orange"></span>有草稿 · 继续评估入口
      </div>
      <div class="sidebar-item" data-page="home-reassess" onclick="showPage(this)">
        <span class="dot red"></span>红点提示 · 待重新评估
      </div>
    </div>
    <div class="sidebar-group">
      <div class="sidebar-group-title">弹窗 / 浮层</div>
      <div class="sidebar-item" data-page="modal-modes" onclick="showPage(this)">
        <span class="dot blue"></span>模式选择面板
      </div>
      <div class="sidebar-item" data-page="modal-connect" onclick="showPage(this)">
        <span class="dot blue"></span>连接设备提示
      </div>
    </div>
  </div>
</div>

<div class="phone-area">
  <div class="phone-frame" id="phone"></div>
</div>

<script>
const MODES = [
  { name: 'Activation', type: 'EMS', time: '24 mins', icon: 'zap' },
  { name: 'Strength', type: 'EMS', time: '24 mins', icon: 'dumbbell' },
  { name: 'Endurance', type: 'EMS', time: '30 mins', icon: 'timer' },
  { name: 'Pain Relief', type: 'TENS', time: '20 mins', icon: 'heart-pulse' },
  { name: 'Relaxation', type: 'TENS', time: '20 mins', icon: 'cloud' },
  { name: 'Circulation', type: 'EMS', time: '18 mins', icon: 'activity' },
  { name: 'Recovery', type: 'EMS+TENS', time: '25 mins', icon: 'rotate-ccw' },
  { name: 'Sculpt', type: 'EMS', time: '22 mins', icon: 'flame' },
  { name: 'Custom Mix', type: 'EMS+TENS', time: '30 mins', icon: 'sliders-horizontal' },
];

const h = {
  statusBar: () => `<div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="4" width="3" height="8" rx="0.8" fill="#1a1a1a"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="0.8" fill="#1a1a1a"/><rect x="9" y="1" width="3" height="11" rx="0.8" fill="#1a1a1a"/><rect x="13.5" y="0" width="3" height="12" rx="0.8" fill="#1a1a1a"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M1.3 8.3C3.1 5.5 5.4 4 8 4s4.9 1.5 6.7 4.3" stroke="#1a1a1a" stroke-width="1.3" fill="none"/><path d="M3.5 10C4.7 8.2 6.2 7.2 8 7.2s3.3 1 4.5 2.8" stroke="#1a1a1a" stroke-width="1.3" fill="none"/><circle cx="8" cy="11.5" r="1.2" fill="#1a1a1a"/></svg>
      <svg width="27" height="12" viewBox="0 0 27 12"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#1a1a1a" stroke-width="1" fill="none"/><rect x="23.5" y="3.5" width="2" height="5" rx="1" fill="#1a1a1a" opacity="0.35"/><rect x="2" y="2" width="15.4" height="8" rx="1.5" fill="#1a1a1a"/></svg>
    </div>
  </div>`,

  navBar: (title, badge) => `<div class="nav-bar">
    <div class="back-btn"><i data-lucide="chevron-left" style="width:24px;height:24px;color:#1a1a1a"></i></div>
    <span class="title">${title}</span>
    <div class="settings-btn"><i data-lucide="settings" style="width:22px;height:22px;color:#1a1a1a"></i>${badge ? '<span class="badge-dot"></span>' : ''}</div>
  </div>`,

  device: (connected, battery) => connected ? `<div class="device-section">
    <div class="device-img-wrap"><div class="device-placeholder"><div class="cam"></div></div></div>
    <div class="device-status-row">
      <i data-lucide="battery-medium" style="width:18px;height:18px;color:#999"></i>
      <span>${battery}%</span>
      <i data-lucide="bluetooth" style="width:14px;height:14px;color:#999"></i>
    </div>
    <div class="device-ready-text">Ready to Start</div>
  </div>` : `<div class="device-section">
    <div class="device-img-wrap"><div class="device-placeholder" style="opacity:0.45"><div class="cam"></div></div></div>
    <div class="device-ready-text" style="color:#c4787a">Device Not Connected</div>
    <div class="connect-cta"><i data-lucide="bluetooth" style="width:14px;height:14px;color:#fff"></i> Connect Device</div>
  </div>`,

  schedule: (items) => {
    const rows = items.map((it, i) => `<div class="schedule-item">
      <div class="schedule-num">0${i+1}</div>
      <div class="schedule-info"><div class="schedule-name">${it.name}</div><div class="schedule-meta">${it.type}  ${it.time}</div></div>
      <i data-lucide="chevron-right" style="width:18px;height:18px;color:#ccc"></i>
    </div>`).join('');
    return `<div class="card"><div class="card-header"><span class="card-title">Today's training plan</span><span class="card-link">View Schedule</span></div>${rows}</div>`;
  },

  customize: () => `<div class="customize-card">
    <div><div class="customize-label">Customize training</div><div class="customize-desc">Choose a Training to Start</div></div>
    <i data-lucide="chevron-right" style="width:20px;height:20px;color:#ccc"></i>
  </div>`,

  trainingRecord: (sessions, bars) => {
    const barsHtml = bars.map(v => `<div class="mini-bar" style="height:${Math.max(v,3)}px;background:${v > 0 ? '#c4787a' : '#e0e0e0'}"></div>`).join('');
    return `<div class="record-card"><div class="record-header"><span class="record-title">Training Record</span><i data-lucide="chevron-right" style="width:18px;height:18px;color:#ccc"></i></div>
    <div class="record-body"><div><div class="stat-label">Sessions</div><div class="stat-value">${sessions}</div></div><div class="mini-bars">${barsHtml}</div></div></div>`;
  },

  assessmentRecord: (score) => `<div class="record-card"><div class="record-header"><span class="record-title">Assessment Record</span><i data-lucide="chevron-right" style="width:18px;height:18px;color:#ccc"></i></div>
    <div class="record-body"><div><div class="stat-label">ICIQ</div><div class="stat-value">${score}%</div></div>
    <svg width="120" height="40" viewBox="0 0 120 40"><polyline points="5,35 25,28 45,24 65,18 85,14 105,10" fill="none" stroke="#e8d0d0" stroke-width="2" stroke-linecap="round"/><circle cx="5" cy="35" r="3" fill="#e8e0e0"/><circle cx="25" cy="28" r="3" fill="#e0d8d8"/><circle cx="45" cy="24" r="3.5" fill="#dcc8c8"/><circle cx="65" cy="18" r="3.5" fill="#d4b8b8"/><circle cx="85" cy="14" r="4" fill="#cca0a0"/><circle cx="105" cy="10" r="5" fill="#c4787a"/></svg>
    </div></div>`,

  assessmentCTA: () => `<div class="assessment-cta">
    <div class="cta-text"><div class="cta-title">Pelvic Floor Assessment</div><div class="cta-desc">Comprehensive pelvic floor health assessment</div><div class="cta-link">Take now <i data-lucide="chevron-right" style="width:14px;height:14px"></i></div></div>
    <div class="cta-illust"><i data-lucide="clipboard-check" style="width:32px;height:32px;color:#c4787a"></i></div>
  </div>`,

  emptySchedule: () => `<div class="card"><div class="card-header"><span class="card-title">Today's training plan</span></div>
    <div class="empty-box"><div class="empty-icon"><i data-lucide="calendar-x" style="width:32px;height:32px;color:#ccc"></i></div>
    <div class="empty-text">No active schedule.<br>Complete an assessment to get started.</div><div class="empty-btn">Take Assessment</div></div></div>`,

  restDay: () => `<div class="card"><div class="card-header"><span class="card-title">Today's training plan</span><span class="card-link">View Schedule</span></div>
    <div class="rest-box"><div class="rest-emoji">🌿</div><div class="rest-text">Rest day today.<br>Your next session is <b>Wednesday</b>.</div></div></div>`,

  doneDay: () => `<div class="card"><div class="card-header"><span class="card-title">Today's training plan</span><span class="card-link">View Schedule</span></div>
    <div class="done-box"><div class="done-check"><i data-lucide="check-circle-2" style="width:26px;height:26px;color:#4caf50"></i></div><div class="done-text">All done for today! Great job.</div></div></div>`,

  draft: () => `<div class="draft-banner" style="background:linear-gradient(135deg,#fff3e0,#ffe0b2)">
    <div class="icon-wrap" style="background:#ff9800"><i data-lucide="file-edit" style="width:18px;height:18px;color:#fff"></i></div>
    <div class="text"><div class="label" style="color:#e65100">Continue Assessment</div><div class="desc" style="color:#bf360c">You have an unfinished assessment. Continue where you left off.</div></div>
    <i data-lucide="chevron-right" style="width:18px;height:18px;color:#e65100"></i>
  </div>`,

  reassess: () => `<div class="draft-banner" style="background:linear-gradient(135deg,#fce4ec,#f8bbd0)">
    <div class="icon-wrap" style="background:#c4787a"><i data-lucide="clipboard-check" style="width:18px;height:18px;color:#fff"></i></div>
    <div class="text"><div class="label" style="color:#c62828">Reassessment Available</div><div class="desc" style="color:#ad1457">Your training cycle is complete. Take a reassessment to track your progress.</div></div>
    <i data-lucide="chevron-right" style="width:18px;height:18px;color:#c62828"></i>
  </div>`,

  emptyRecord: (type) => `<div class="record-card"><div class="record-header"><span class="record-title">${type === 'training' ? 'Training Record' : 'Assessment Record'}</span><i data-lucide="chevron-right" style="width:18px;height:18px;color:#ccc"></i></div><div class="no-data-text">No records yet</div></div>`,
};

const pages = {
  'home-connected': () => h.statusBar() + h.navBar('My PulseCare', false) + '<div class="page-content">' +
    h.device(true, 67) +
    h.schedule([{name:'Activation',type:'EMS',time:'24 mins'},{name:'Strength Mode',type:'EMS',time:'24 mins'}]) +
    h.customize() +
    h.trainingRecord(11, [3,3,3,12,28,35,40]) +
    h.assessmentRecord(80) +
    h.assessmentCTA() + '</div>',

  'home-completed': () => h.statusBar() + h.navBar('My PulseCare', false) + '<div class="page-content">' +
    h.device(true, 52) + h.doneDay() + h.customize() +
    h.trainingRecord(12, [3,12,28,35,40,38,42]) + h.assessmentRecord(80) + h.assessmentCTA() + '</div>',

  'home-rest': () => h.statusBar() + h.navBar('My PulseCare', false) + '<div class="page-content">' +
    h.device(true, 89) + h.restDay() + h.customize() +
    h.trainingRecord(11, [3,3,3,12,28,35,40]) + h.assessmentRecord(80) + h.assessmentCTA() + '</div>',

  'home-no-schedule': () => h.statusBar() + h.navBar('My PulseCare', false) + '<div class="page-content">' +
    h.device(true, 100) + h.emptySchedule() + h.customize() +
    h.emptyRecord('training') + h.emptyRecord('assessment') + h.assessmentCTA() + '</div>',

  'home-disconnected': () => h.statusBar() + h.navBar('My PulseCare', false) + '<div class="page-content">' +
    h.device(false) +
    h.schedule([{name:'Activation',type:'EMS',time:'24 mins'},{name:'Strength Mode',type:'EMS',time:'24 mins'}]) +
    h.customize() + h.trainingRecord(11, [3,3,3,12,28,35,40]) + h.assessmentRecord(80) + h.assessmentCTA() + '</div>',

  'home-draft': () => h.statusBar() + h.navBar('My PulseCare', false) + '<div class="page-content">' +
    h.device(true, 67) + h.draft() +
    h.schedule([{name:'Activation',type:'EMS',time:'24 mins'}]) +
    h.customize() + h.trainingRecord(8, [3,10,15,22,28,30,32]) + h.assessmentRecord(65) + h.assessmentCTA() + '</div>',

  'home-reassess': () => h.statusBar() + h.navBar('My PulseCare', true) + '<div class="page-content">' +
    h.device(true, 45) + h.reassess() + h.doneDay() + h.customize() +
    h.trainingRecord(24, [20,25,30,28,35,38,40]) + h.assessmentRecord(85) + h.assessmentCTA() + '</div>',

  'modal-modes': () => {
    const cards = MODES.map((m, i) => `<div class="mode-card${i===0?' sel':''}">
      <div class="mode-icon-box"><i data-lucide="${m.icon}" style="width:20px;height:20px;color:#c4787a"></i></div>
      <div class="mode-name">${m.name}</div><div class="mode-time">${m.type} · ${m.time}</div>
    </div>`).join('');
    return h.statusBar() + h.navBar('My PulseCare', false) +
      '<div class="page-content" style="filter:brightness(0.6)">' + h.device(true, 67) + h.schedule([{name:'Activation',type:'EMS',time:'24 mins'}]) + '</div>' +
      `<div class="mode-panel"><div class="mode-handle"></div><div class="mode-panel-title">Select Training Mode</div><div class="mode-grid">${cards}</div></div>`;
  },

  'modal-connect': () => h.statusBar() + h.navBar('My PulseCare', false) +
    '<div class="page-content">' + h.device(false) + h.schedule([{name:'Activation',type:'EMS',time:'24 mins'}]) + '</div>' +
    `<div class="overlay"><div class="dialog">
      <div class="dialog-icon"><i data-lucide="bluetooth" style="width:26px;height:26px;color:#1976d2"></i></div>
      <div class="dialog-title">Connect Your Device</div>
      <div class="dialog-desc">Please connect your PulseCare device to start training. Make sure Bluetooth is enabled.</div>
      <button class="btn-primary">Connect Now</button>
      <button class="btn-ghost">Later</button>
    </div></div>`,
};

function showPage(el) {
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('phone').innerHTML = pages[el.dataset.page]();
  if (window.lucide) lucide.createIcons();
}

document.addEventListener('DOMContentLoaded', () => {
  showPage(document.querySelector('.sidebar-item.active'));
});
</script>
</body>
</html>
